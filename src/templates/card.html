<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card News</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1920px;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('{{image_url}}') center/cover no-repeat;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(0,0,0,0.8) 0%,
                rgba(0,0,0,0.6) 30%,
                rgba(0,0,0,0.4) 60%,
                rgba(0,0,0,0.2) 80%,
                rgba(0,0,0,0) 100%
            );
        }

        .content {
            position: absolute;
            top: 120px;
            left: 60px;
            right: 60px;
            color: white;
            z-index: 10;
        }

        .category {
            font-size: 24px;
            font-weight: 500;
            color: {{accent_color}};
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .title {
            font-size: 72px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 40px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 36px;
            font-weight: 400;
            line-height: 1.4;
            opacity: 0.95;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .logo {
            position: absolute;
            bottom: 80px;
            right: 60px;
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="content">
        <div class="category">{{category}}</div>
        <div class="title">{{title}}</div>
        <div class="subtitle">{{content}}</div>
    </div>

    <div class="logo">WORKGRIT</div>
</body>
</html>
