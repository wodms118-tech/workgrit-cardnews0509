<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card News</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1920px;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        .slide-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .slide.active {
            opacity: 1;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('{{slide.image_url}}') center/cover no-repeat;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(0,0,0,0.8) 0%,
                rgba(0,0,0,0.6) 30%,
                rgba(0,0,0,0.4) 60%,
                rgba(0,0,0,0.2) 80%,
                rgba(0,0,0,0) 100%
            );
        }

        .content {
            position: absolute;
            top: 120px;
            left: 60px;
            right: 60px;
            color: white;
            z-index: 10;
        }

        .category-tag {
            position: absolute;
            top: 60px;
            left: 60px;
            font-size: 24px;
            font-weight: 500;
            color: #C8FF00;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 20;
        }

        .point-bar {
            width: 80px;
            height: 4px;
            background: #C8FF00;
            margin-bottom: 30px;
            border-radius: 2px;
        }

        .title-section {
            margin-bottom: 40px;
        }

        .front-text {
            font-size: 44px;
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 10px;
            display: inline;
        }

        .keyword {
            font-size: 88px;
            font-weight: 900;
            line-height: 1.1;
            color: #C8FF00;
            transform: rotate(-3deg);
            display: inline-block;
            margin: 0 10px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.7);
        }

        .back-text {
            font-size: 44px;
            font-weight: 300;
            line-height: 1.2;
            display: inline;
        }

        .subtitle {
            font-size: 32px;
            font-weight: 300;
            line-height: 1.4;
            opacity: 0.95;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .progress-bar {
            position: absolute;
            bottom: 120px;
            left: 60px;
            right: 60px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            z-index: 15;
        }

        .progress-fill {
            height: 100%;
            background: #C8FF00;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .swipe-arrow {
            position: absolute;
            bottom: 160px;
            right: 60px;
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #C8FF00;
            font-size: 24px;
            cursor: pointer;
            z-index: 15;
            transition: background 0.3s ease;
        }

        .swipe-arrow:hover {
            background: rgba(0,0,0,0.9);
        }

        .swipe-arrow.hidden {
            display: none;
        }

        .logo {
            position: absolute;
            bottom: 80px;
            right: 60px;
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
            z-index: 15;
        }
    </style>
</head>
<body>
    <div class="slide-container" id="slideContainer">
        {{#each slides}}
        <div class="slide{{#if @first}} active{{/if}}" data-slide="{{@index}}">
            <div class="background"></div>
            <div class="overlay"></div>
            <div class="category-tag">{{category}}</div>
            <div class="content">
                <div class="point-bar"></div>
                <div class="title-section">
                    <span class="front-text">{{front_text}}</span>
                    <span class="keyword">{{keyword}}</span>
                    <span class="back-text">{{back_text}}</span>
                </div>
                <div class="subtitle">{{content}}</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: {{progress}}%"></div>
            </div>
            {{#unless @last}}
            <div class="swipe-arrow" onclick="nextSlide()">→</div>
            {{/unless}}
            <div class="logo">WORKGRIT</div>
        </div>
        {{/each}}
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;

        function updateSlides() {
            slides.forEach((slide, index) => {
                slide.classList.toggle('active', index === currentSlide);
            });
            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentSlide + 1) / totalSlides) * 100;
            document.querySelector('.progress-fill').style.width = progress + '%';
        }

        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                updateSlides();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlides();
            }
        }

        // Touch events for swipe
        let startX = 0;
        let startY = 0;

        document.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            if (!startX || !startY) return;

            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const diffX = startX - endX;
            const diffY = startY - endY;

            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                if (diffX > 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
            }

            startX = 0;
            startY = 0;
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        updateSlides();
    </script>
</body>
</html>
