<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card News</title>
    <style>
        body {
            width: 1080px;
            height: 1080px;
            margin: 0;
            padding: 80px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #333;
        }
        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 40px;
            color: #2c3e50;
        }
        .content {
            font-size: 32px;
            line-height: 1.6;
            max-width: 800px;
        }
        .accent {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="title">{{title}}</div>
    <div class="content">{{content}}</div>
</body>
</html>
